# General Settings
backend = "glx";
vsync = true;

# Shadows (The "Floating" effect)
shadow = true;
shadow-radius = 12;
shadow-offset-x = -12;
shadow-offset-y = -12;
shadow-opacity = 0.4;
shadow-exclude = [ 
  "class_g = 'Polybar'" 
];

# Fading (Smooth transitions)
fading = true;
fade-in-step = 0.03;
fade-out-step = 0.03;

# Transparency & Opacity Rules
active-opacity = 0.95;
inactive-opacity = 0.85;

opacity-rule = [
  "100:class_g = 'mpv'",            # Solid video for movies/anime
  "100:class_g = 'Carbonyl'",      # Better visibility for terminal browser
  "100:class_g = 'kitty' && focused",
  "100:class_g = 'kitty' && !focused"
];

# Corners
corner-radius = 8;

# Blur Settings
blur: {
  method = "box";
  strength = 2; 
  background = true;
};

# Exclude video from being blurred (saves massive CPU/GPU heat)
blur-background-exclude = [
  "class_g = 'mpv'",
  "window_type = 'desktop'",
  "_GTK_FRAME_EXTENTS@:c"
];

# Window specific settings
wintypes:
{
  tooltip = { fade = true; shadow = true; opacity = 0.75; focus = true; full-shadow = false; };
  dock = { shadow = false; clip-shadow-above = true; }
  dnd = { shadow = false; }
  popup_menu = { opacity = 0.8; }
  dropdown_menu = { opacity = 0.8; }
};
