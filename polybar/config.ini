[colors]
# Syntax: ${xrdb:colorN:fallback_hex}
background = ${xrdb:color0:#1a1b26}
foreground = ${xrdb:color7:#c0caf5}
primary    = ${xrdb:color4:#7f7fd5}
secondary  = ${xrdb:color5:#ff79c6}
alert      = ${xrdb:color1:#f7768e}

[bar/main]
enabel-ipc = true
width = 100%
height = 24pt
radius = 0
background = ${colors.background}
foreground = ${colors.foreground}
line-size = 3pt
padding-left = 1
padding-right = 1
module-margin = 1
font-0 = "JetBrainsMono Nerd Font:size=10;2"

modules-left = bspwm
modules-center = date
modules-right = cpu memory network pulseaudio date

[module/bspwm]
type = internal/bspwm
label-focused = %name%
label-focused-background = ${colors.background-alt}
label-focused-underline= ${colors.primary}
label-focused-padding = 2
label-occupied = %name%
label-occupied-padding = 2
label-urgent = %name%
label-urgent-background = ${colors.secondary}
label-urgent-padding = 2
label-empty = %name%
label-empty-foreground = #565f89
label-empty-padding = 2

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = " "
format-prefix-foreground = ${colors.primary}
label = %percentage%%

[module/memory]
type = internal/memory
interval = 2
format-prefix = " "
format-prefix-foreground = ${colors.secondary}
label = %percentage_used%%

[module/network]
type = internal/network
interface = wlan0
label-connected = "󰖩 %essid%"
label-connected-foreground = #9ece6a
label-disconnected = "󰖪 "
label-disconnected-foreground = #f7768e

[module/date]
type = internal/date
interval = 1
date = %H:%M
label = %date%
label-foreground = ${colors.foreground}

[module/pulseaudio]
type = internal/pulseaudio

# Show a speaker icon and the percentage
format-volume = <label-volume>
label-volume = "󰕾 %percentage%%"
label-volume-foreground = ${colors.primary}

# What to show when muted
label-muted = "󰝟 Muted"
label-muted-foreground = ${colors.alert}

# Click to open a terminal mixer (like ncmpcpp or alsamixer)
click-right = kitty -e alsamixer
